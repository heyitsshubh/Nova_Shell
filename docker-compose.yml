services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: novashell
      POSTGRES_PASSWORD: password
      POSTGRES_DB: novashell_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
